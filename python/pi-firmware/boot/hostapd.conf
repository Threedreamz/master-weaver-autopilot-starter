# AutoPilot CT — WiFi Access Point Configuration
# Copy to /etc/hostapd/hostapd.conf on the Raspberry Pi 5
#
# SSID: AutoPilot-CT | Password: autopilot2026
# Band: 5GHz 802.11ac | Channel: 36
# Security: WPA2-PSK (CCMP)

interface=wlan0
driver=nl80211

# Network
ssid=AutoPilot-CT
country_code=DE

# 5GHz 802.11ac (Wi-Fi 5)
hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1
wmm_enabled=1

# WPA2 security
auth_algs=1
wpa=2
wpa_passphrase=autopilot2026
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# HT/VHT capabilities for performance
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][DSSS_CCK-40]
vht_capab=[SHORT-GI-80]
vht_oper_chwidth=0
vht_oper_centr_freq_seg0_idx=38

# Max clients (iPad + Windows PC + a few spare)
max_num_sta=10

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
