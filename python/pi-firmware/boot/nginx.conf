server {
    listen 80 default_server;
    server_name autopilot.local _;

    # Determine if setup is complete
    # If /opt/autopilot/config/setup-complete exists → iPad app
    # Otherwise → Setup portal

    location / {
        # Try setup-complete file
        set $upstream http://127.0.0.1:4804;
        if (-f /opt/autopilot/config/setup-complete) {
            set $upstream http://127.0.0.1:4800;
        }
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Download page always goes to setup portal
    location /download {
        proxy_pass http://127.0.0.1:4804;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Camera streams → Kamera-Pi via mDNS (autopilot-cam.local)
    # Falls back to static IP 192.168.4.11 if mDNS unavailable
    resolver 127.0.0.1 valid=30s ipv6=off;
    set $camera_upstream "autopilot-cam.local";
    location /camera/ {
        proxy_pass http://$camera_upstream:4811/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 5s;
    }

    # CT-PC proxy → Windows PC via Ethernet (192.168.5.0/24 subnet)
    location /api/ct/ {
        proxy_pass http://192.168.5.2:4802/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API discovery (always setup portal)
    location /api/discovery {
        proxy_pass http://127.0.0.1:4804;
        proxy_set_header Host $host;
    }

    # Static files for download
    location /releases/ {
        alias /opt/autopilot/releases/;
        autoindex off;
    }
}
