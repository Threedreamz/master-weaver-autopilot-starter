# AutoPilot CT — DHCP + DNS for WiFi Access Point
# Copy to /etc/dnsmasq.conf on the Raspberry Pi 5
#
# Pi IP: 192.168.4.1
# DHCP range: 192.168.4.10 – 192.168.4.50
# No internet forwarding — pure local network

# Only listen on the AP interface
interface=wlan0
bind-interfaces

# DHCP range: .10 to .50 with 12-hour leases
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h

# Gateway — point clients to this Pi (no internet, but required for DHCP)
dhcp-option=3,192.168.4.1

# DNS — this Pi handles local DNS resolution
dhcp-option=6,192.168.4.1

# Local domain for the AP network
domain=autopilot.local
local=/autopilot.local/

# Static hostname mappings
address=/autopilot-pi.local/192.168.4.1
address=/autopilot.local/192.168.4.1

# Don't read /etc/resolv.conf — we have no upstream DNS
no-resolv

# Don't forward unresolvable names — no internet
bogus-priv

# Logging
log-queries
log-dhcp
log-facility=/var/log/dnsmasq.log
